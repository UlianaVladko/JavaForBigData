services:

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # TODO 6: Исправьте Kafka listeners
      # Проблема: все контейнеры используют localhost:9092, но это их собственный loopback
      # Нужно: PLAINTEXT://kafka:29092 (внутри Docker) + EXTERNAL://localhost:9092 (для хоста)
      # Обновите: LISTENERS, ADVERTISED_LISTENERS, LISTENER_SECURITY_PROTOCOL_MAP
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: ktEO2hcyQBufbRYX46FHjw
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 5s
      retries: 5

  ksqldb-server:
    image: confluentinc/ksqldb-server:0.29.0
    ports:
      - "8088:8088"
    environment:
      # TODO 7: Измените на kafka:29092
      KSQL_BOOTSTRAP_SERVERS: kafka:29092
      KSQL_LISTENERS: http://0.0.0.0:8088
      KSQL_KSQL_SERVICE_ID: seminar8-ksql
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"
      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"
    depends_on:
      kafka:
        condition: service_healthy

  spark:
    image: bitnamilegacy/spark:3.5
    user: root
    hostname: spark
    ports:
      - "4040:4040"
      - "7077:7077"
      - "8081:8080"
    environment:
      SPARK_MODE: master
      HOME: /tmp
      USER: spark
      JAVA_TOOL_OPTIONS: "-Duser.name=spark -Duser.home=/tmp -Divy.home=/tmp/.ivy2 -Dhadoop.security.authentication=simple"
      SPARK_LOCAL_DIRS: /tmp
      SPARK_CONF_DIR: /tmp
      SPARK_DRIVER_EXTRAJavaOptions: "-Divy.home=/tmp/.ivy2"
      SPARK_EXECUTOR_EXTRAJavaOptions: "-Divy.home=/tmp/.ivy2"
    volumes:
      - ./spark:/spark
    depends_on:
      kafka:
        condition: service_healthy

  spark-worker:
    image: bitnamilegacy/spark:3.5
    user: root
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark:7077
      HOME: /tmp
      USER: spark
      JAVA_TOOL_OPTIONS: "-Duser.name=spark -Duser.home=/tmp -Divy.home=/tmp/.ivy2 -Dhadoop.security.authentication=simple"
      SPARK_LOCAL_DIRS: /tmp
    depends_on:
      - spark

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      # TODO 8: Измените на kafka:29092
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # TODO 9: Измените на kafka:29092
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
